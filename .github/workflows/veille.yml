# VEILLE STRATEGIQUE — GitHub Actions Workflow
# Veille quotidienne + hebdomadaire + mensuelle
# Avec deduplication des articles deja envoyes

name: Veille Stratégique

on:
  schedule:
    - cron: "0 6 * * *"    # 7h00 Casablanca tous les jours
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode execution'
        required: false
        default: 'quotidien'
        type: choice
        options:
          - quotidien
          - hebdomadaire
          - mensuel

jobs:
  generer-rapport:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Permission pour lire/ecrire dans le repo (deduplication)
    permissions:
      contents: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install anthropic requests

      - name: Générer et envoyer le rapport
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_EXPEDITEUR:    ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_DE_PASSE:  ${{ secrets.EMAIL_MOT_DE_PASSE }}
          EMAIL_DESTINATAIRES: ${{ secrets.EMAIL_DESTINATAIRES }}
          MODE: ${{ github.event.inputs.mode || 'auto' }}
          # Token GitHub automatique pour la deduplication
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: python scripts/veille.py

      - name: Alerte en cas d'erreur
        if: failure()
        run: echo "❌ La veille a échoué. Vérifiez les logs GitHub Actions."
