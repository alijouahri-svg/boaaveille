# VEILLE STRATEGIQUE — GitHub Actions Workflow

name: Veille Stratégique Quotidienne

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode execution'
        required: false
        default: 'quotidien'
        type: choice
        options:
          - quotidien
          - quinzaine

jobs:
  generer-rapport:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install anthropic requests

      - name: Générer et envoyer le rapport
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY:      ${{ secrets.TAVILY_API_KEY }}
          EMAIL_EXPEDITEUR:    ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_DE_PASSE:  ${{ secrets.EMAIL_MOT_DE_PASSE }}
          EMAIL_DESTINATAIRES: ${{ secrets.EMAIL_DESTINATAIRES }}
          MODE: ${{ github.event.inputs.mode || 'quotidien' }}
        run: python scripts/veille.py

      - name: Alerte en cas d'erreur
        if: failure()
        run: echo "❌ La veille a échoué. Vérifiez les logs GitHub Actions."
