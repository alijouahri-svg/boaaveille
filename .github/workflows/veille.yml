# ============================================================
# VEILLE STRATÉGIQUE — GitHub Actions Workflow
# Fichier à placer dans : .github/workflows/veille.yml
# ============================================================

name: Veille Stratégique Quotidienne

on:
  # Déclenchement automatique chaque matin à 7h00 (Casablanca = UTC+1)
  schedule:
    - cron: "0 6 * * *"   # 6h UTC = 7h Casablanca

  # Déclenchement manuel depuis GitHub (pour tester)
  workflow_dispatch:

jobs:
  generer-rapport:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Récupérer le code du dépôt
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Configurer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Installer les dépendances
      - name: Installer les dépendances
        run: |
          pip install anthropic

      # 4. Lancer le script de veille
      - name: Générer et envoyer le rapport
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_EXPEDITEUR:    ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_DE_PASSE:  ${{ secrets.EMAIL_MOT_DE_PASSE }}
          EMAIL_DESTINATAIRES: ${{ secrets.EMAIL_DESTINATAIRES }}
        run: |
          python scripts/veille.py

      # 5. Notification en cas d'échec
      - name: Alerte en cas d'erreur
        if: failure()
        run: |
          echo "❌ La veille du jour a échoué. Vérifiez les logs GitHub Actions."
